  Person person = 1;
}
message UpdatePersonResponse {
  Person person = 1;
  string message = 2;
}


// ARTIST

// ARTIST = ADD
message AddArtistRequest {
  string title = 2;
  string short_title = 3;
  repeated string type = 4;
  string city = 5;
  string region = 6;
  string country = 7;
  string site = 8;
  repeated string photo = 9;
  string bio = 10;
  repeated string socmedia = 11;
  repeated string release = 12;
  repeated string team = 13;
  bool active = 14;
  string owner_id = 15;
  google.protobuf.Timestamp created = 16;
  google.protobuf.Timestamp updated = 17;
  google.protobuf.Timestamp expires = 18;
}
message AddArtistResponse {
  string id = 1;
  string title = 2;
  string short_title = 3;
  repeated string type = 4;
  string city = 5;
  string region = 6;
  string country = 7;
  string site = 8;
  repeated string photo = 9;
  string bio = 10;
  repeated string socmedia = 11;
  repeated string release = 12;
  repeated string team = 13;
  bool active = 14;
  string owner_id = 15;
  google.protobuf.Timestamp created = 16;
  google.protobuf.Timestamp updated = 17;
  google.protobuf.Timestamp expires = 18;
}
// ARTISTS = LIST
message ListArtistsRequest {
  // Можно добавить фильтры при необходимости, например region, app_id и т.д.
}
message ListArtistsResponse {
  repeated AddArtistResponse artists = 1;
}
// ARTIST = GET = ByID
message GetArtistByIDRequest {
  string id = 1;
}
message GetArtistByIDResponse {
  Artist artist = 1;
  string Message = 2;
}
// ARTIST = UPDATE
message UpdateArtistRequest {
  Artist artist = 1;
}
message UpdateArtistResponse {
  Artist artist = 1;
  string message = 2;
}

// SONG

// SONG = ADD
message AddSongRequest {
  repeated string artist = 2;
  string title = 3;
  repeated string author_lyrics = 4;
  repeated string author_music = 5;
  repeated string arranger = 6;
  repeated string audio = 7;
  repeated string clip = 8;
  repeated string video = 9;
  repeated string pts = 10;
  string release = 11;
  string lyrics = 12;
  bool active = 13;
  string owner_id = 14;
  google.protobuf.Timestamp created = 15;
  google.protobuf.Timestamp updated = 16;
  google.protobuf.Timestamp expires = 17;
  string language = 18;                  // язык песни, по умолчанию русский
  string translation = 19;               // перевод текста песни на русский язык (обязателен для песен не на русском)
}
message AddSongResponse {
  Song song = 1;
  string message = 2;
}
// SONGS = LIST
message ListSongsRequest {
  // Можно добавить фильтры
}
message ListSongsResponse {
  repeated AddSongResponse songs = 1;
}
// SONG = GET = ByID
message GetSongByIDRequest {
  string id = 1;
}
message GetSongByIDResponse {
  Song song = 1;
  string message = 2;
}
// SONG = UPDATE
message UpdateSongRequest {
  Song song = 1;
}
message UpdateSongResponse {
  Song song = 1;
  string message = 2;
}
// SONG = UPDATE 720 status
message UpdateSong720Request {
  string id = 1;                   // ID песни
  repeated string video_720p = 2;  // пути к 720 версиям видео
  repeated string clip_720p = 3;   // пути к 720 версиям клипов
  string convert_status = 4;       // "pending" | "completed" | "failed"
  string convert_error = 5;        // текст ошибки если failed
}
message UpdateSong720Response {
  string id = 1;
  string message = 2;
}

// LITWORK

