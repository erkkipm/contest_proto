syntax = "proto3";
// Текущий пакет - указывает пространство имен для сервиса и сообщений.
package contest;
// Настройки для генерации GO кода. Используется при генерации файлов на GO
option go_package = "github.com/erkkipm/contest_proto/gen/go;contestV1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/field_mask.proto";

// Сервис для входа и регистрации
service Contest{
  // ==== ЗАЯВКИ ====
  // CONTEST = ADD
  rpc AddContest (AddContestRequest) returns (AddContestResponse); // Используется в grpc_contest.go
  // CONTEST = GET = ByID
  rpc GetContestByID (GetContestByIDRequest) returns (GetContestByIDResponse); // Используется в grpc_contest.go — метод реализован на сервере СОФИТ
  // CONTEST = GET = ByPerson
  rpc GetContestsByPersonID (GetContestByPersonIDRequest) returns (GetContestsByPersonIDResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  // CONTEST = GET = With Empty Category \\ с пустой категорией
  rpc GetContestWithEmptyCategory(GetContestWithEmptyCategoryRequest) returns (GetContestWithEmptyCategoryResponse); // Используется в grpc_contest.go
  // CONTESTS = LIST || все заявки
  rpc ListContests(ListContestsRequest) returns (ListContestsResponse); // Используется в grpc_contest.go
  // CONTESTS = LIST = Without Category \\ заявки без номинации (category пустая/отсутствует)
  rpc ListContestsWithoutCategory(ListContestsWithoutCategoryRequest) returns (ListContestsWithoutCategoryResponse); // Используется в grpc_contest.go
  // CONTESTS = LIST = By Category \\ с категорией
  rpc ListContestsByCategory(ListContestsByCategoryRequest) returns (ListContestsByCategoryResponse); // Используется в grpc_contest.go
  // CONTESTS = LIST = By Category = For Site \\ с категорией
  rpc ListContestsByCategoryForSite(ListContestsByCategoryForSiteRequest) returns (ListContestsByCategoryForSiteResponse); // Используется в grpc_contest.go
  // CONTESTS = LIST = By Region
  rpc ListContestsByRegion (ListContestsByRegionRequest) returns (ListContestsByRegionResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  CONTESTS = UPDATE
  rpc UpdateContest (UpdateContestRequest) returns (UpdateContestResponse); // Используется в grpc_contest.go
  //  CONTESTS = SET RATE
  rpc UpdateContestAddRate (UpdateContestAddRateRequest) returns (UpdateContestAddRateResponse); // Используется в grpc_contest.go

  // ==== ПЕРСОНА ====
  // PERSON = ADD
  rpc AddPerson (AddPersonRequest) returns (AddPersonResponse); // Используется в grpc_contest.go
  //  PERSON = GET = ByID //  Получение данных персоны по ID
  rpc GetPersonByID (GetPersonByIDRequest) returns (GetPersonByIDResponse); // Используется в grpc_contest.go
  //  PERSON = LIST
  rpc ListPersons (ListPersonsRequest) returns (ListPersonsResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  PERSON = LIST = ByRegion || Получение всех персон в регионе
  rpc ListPersonsByRegion (ListPersonsByRegionRequest) returns (ListPersonsByRegionResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  PERSON = UPDATE
  rpc UpdatePerson (UpdatePersonRequest) returns (UpdatePersonResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ

  //  ==== АРТИСТ ====
  // ДОБАВИТЬ
  rpc AddArtist (AddArtistRequest) returns (AddArtistResponse); // Используется в grpc_contest.go
  //  СПИСОК
  rpc ListArtists (ListArtistsRequest) returns (ListArtistsResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  ПОЛУЧИТЬ
  rpc GetArtistByID (GetArtistByIDRequest) returns (GetArtistByIDResponse); // Используется в grpc_contest.go
  //  PERSON = UPDATE
  rpc UpdateArtist (UpdateArtistRequest) returns (UpdateArtistResponse); // Используется в grpc_contest.go

  // ==== ПЕСНЯ =====
  // ДОБАВИТЬ
  rpc AddSong (AddSongRequest) returns (AddSongResponse); // Используется в grpc_contest.go
  //  СПИСОК
  rpc ListSongs (ListSongsRequest) returns (ListSongsResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  ПОЛУЧИТЬ
  rpc GetSongByID (GetSongByIDRequest) returns (GetSongByIDResponse); // Используется в grpc_contest.go
  //  ОБНОВИТЬ
  rpc UpdateSong (UpdateSongRequest) returns (UpdateSongResponse); // Используется в grpc_contest.go
  //  ОБНОВИТЬ СТАТУС КОНВЕРТАЦИИ 720p
  rpc UpdateSong720 (UpdateSong720Request) returns (UpdateSong720Response); // Используется в grpc_contest.go

  // ===== ЛИТЕРАТУРНОЕ ПРОИЗВЕДЕНИЕ ====
  // ДОБАВИТЬ
  rpc AddLitWork (AddLitWorkRequest) returns (AddLitWorkResponse); // Используется в grpc_contest.go
  //  СПИСОК
  rpc ListLitWorks (ListLitWorksRequest) returns (ListLitWorksResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  ПОЛУЧИТЬ
  rpc GetLitWorkByID (GetLitWorkByIDRequest) returns (GetLitWorkByIDResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ
  //  PERSON = UPDATE
  rpc UpdateLitWork (UpdateLitWorkRequest) returns (UpdateLitWorkResponse); // НЕ РЕАЛИЗОВАНО на сервере СОФИТ

  // ==== ИТОГИ ГОЛОСОВАНИЯ ====
  // Итоги голосования по категории (оценки embedded в заявках: rate[] и rate_top3[])
  rpc GetResultsByCategory (GetResultsByCategoryRequest) returns (GetResultsByCategoryResponse); // Используется в grpc_results.go

  // ==== ТУРЫ ====
  // Открыть тур голосования: competition, categories, type, show_participants
  rpc OpenTour (OpenTourRequest) returns (OpenTourResponse); // Используется в grpc_tour.go
  // Закрыть тур голосования: tour_id
  rpc CloseTour (CloseTourRequest) returns (CloseTourResponse); // Используется в grpc_tour.go
  // Список туров конкурса: competition -> repeated Tour
  rpc ListTours (ListToursRequest) returns (ListToursResponse); // Используется в grpc_tour.go
  // Получить открытый тур: competition, category, type -> Tour или NotFound
  rpc GetOpenTour (GetOpenTourRequest) returns (GetOpenTourResponse); // Используется в grpc_tour.go

  // ==== ЖУРНАЛ АУДИТА ====
  // Список событий журнала для просмотра из админки
  rpc ListAuditEvents (ListAuditEventsRequest) returns (ListAuditEventsResponse); // Используется в grpc_audit.go
}

// ContestShort
message ContestShort {
  string id = 1;
  string category = 5;
  string song_title = 6;
  string song_video = 7;
  string song_audio = 8;
  string artist_name = 9;
  string artist_city = 10;
  string artist_photo = 11;
  bool top3 = 13;
  bool winner = 14;
}

// Contest
message OneContest {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string competition = 3;
  string competition_id = 4;
  string category = 5;
  string author_id = 6;
  string artist_id = 7;
  string song_own_id = 8;
  string song_remake_id = 9;
  string lit_work_id = 10;
  repeated Rate rate = 11;
  repeated Rate rate_top3 = 12;
  bool top3 = 13;
  bool winner = 14;
  int32 sort = 15;
  repeated string rate_book = 16;
  int32 status = 17;
  bool active = 18;
  string owner_id = 19;
  google.protobuf.Timestamp created = 30;
  google.protobuf.Timestamp updated = 31;
  google.protobuf.Timestamp expires = 32;
}

// FullContent ... полная заявка
message FullContent {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string competition = 3;
  string competition_id = 4;
  string category = 5;
  Person author = 6;
  repeated Song song = 7;
  repeated Artist artist_song_own = 8;
  repeated LitWork lit_work = 9;
  repeated Artist artist_song_remake = 10;
  repeated Rate rate = 11;
  repeated Rate rate_top3 = 12;
  bool top3 = 13;
  bool winner = 14;
  int32 sort = 15;
  int32 status = 16;
  bool active = 17;
  string app_id = 18;
  string owner_id = 19;
  google.protobuf.Timestamp created = 31;
  google.protobuf.Timestamp updated = 32;
  google.protobuf.Timestamp expires = 33;
}
// ContentForSite ... заявка для
message ContentForSite {
  string id = 1;
  string category = 2;
  repeated Song songs = 3;
  repeated Artist artists = 4;
  repeated Rate rate = 11;
  repeated Rate rate_top3 = 12;
  bool top3 = 13;
  bool winner = 14;
  bool active = 18;
  string owner_id = 19;
  google.protobuf.Timestamp created = 31;
  google.protobuf.Timestamp updated = 32;
  google.protobuf.Timestamp expires = 33;
}

// Person
message Person {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string middle_name = 4;
  repeated string phone = 5;
  repeated string email = 6;
  //  string login = 7;
  string bio = 7;
  string city = 8;
  string region = 9;
  string country = 10;
  bool active = 11;
  string owner_id = 12;
  google.protobuf.Timestamp created = 13;
  google.protobuf.Timestamp updated = 14;
  google.protobuf.Timestamp expires = 15;
  }

  // Song
message Song {
  string id = 1;
  repeated string artist = 2;
  string title = 3;
  repeated string author_lyrics = 4;
  repeated string author_music = 5;
  repeated string arranger = 6;
  repeated string audio = 7;
  repeated string clip = 8;
  repeated string video = 9;
  repeated string pts = 10;
  string release = 11;
  string lyrics = 12;
  bool active = 13;
  string owner_id = 14;
  google.protobuf.Timestamp created = 15;
  google.protobuf.Timestamp updated = 16;
  google.protobuf.Timestamp expires = 17;
  // Конвертация видео в 720p
  repeated string video_720p = 20;       // пути к 720p версиям видео
  repeated string clip_720p = 21;        // пути к 720p версиям клипов
  string convert_status = 22;            // "" | "pending" | "completed" | "failed"
  string convert_error = 23;             // текст ошибки если failed
  string language = 24;                  // язык песни, по умолчанию русский
  string translation = 25;               // перевод текста песни на русский язык (обязателен для песен не на русском)
}

// Artist
message Artist {
  string id = 1;
  string title = 2;
  string short_title = 3;
  repeated string type = 4;
  string city = 5;
  string region = 6;
  string country = 7;
  string site = 8;
  repeated string photo = 9;
  string bio = 10;
  repeated string socmedia = 11;
  repeated string release = 12;
  repeated string team = 13;
  bool active = 14;
  string owner_id = 15;
  google.protobuf.Timestamp created = 16;
  google.protobuf.Timestamp updated = 17;
  google.protobuf.Timestamp expires = 18;
}

// Rate
message Rate {
  string id = 1;
  string rate_book_id = 2;
  int32 rate = 3;
  string jury = 5;
  bool active = 6;
  string app_id = 15;
  string owner_id = 16;
  google.protobuf.Timestamp created = 17;
  google.protobuf.Timestamp updated = 18;
  google.protobuf.Timestamp expires = 19;
}

// RateBook
message RateBook {
  string id = 1;
  string content_app = 2;
  string song_id = 3;
  string lit_work_id = 4;
  int32 level = 5;
  bool active = 6;
  string app_id = 7;
  string owner_id = 8;
  google.protobuf.Timestamp created = 9;
  google.protobuf.Timestamp updated = 10;
  google.protobuf.Timestamp expires = 11;
}

// ActionMeta - метаданные действия для журнала аудита
message ActionMeta {
  string actor_id = 1; // кто выполнил действие
  string ip = 2;       // IP-адрес, с которого выполнено действие
}

// Tour - тур голосования
message Tour {
  string id = 1;
  string competition = 2;             // идентификатор конкурса
  repeated string categories = 3;     // категории тура (пусто = все категории конкурса)
  string type = 4;                    // тип тура: "main" | "top3"
  string status = 5;                  // статус тура: "open" | "closed"
  bool show_participants = 6;         // жюри видит данные участников или только номер/песню/видео
  google.protobuf.Timestamp opened_at = 7;  // когда открыт
  google.protobuf.Timestamp closed_at = 8;  // когда закрыт
}

// AuditEvent - запись журнала аудита
message AuditEvent {
  string id = 1;
  string action = 2;                     // "vote" | "tour_open" | "tour_close" | ...
  string actor_id = 3;                   // кто выполнил действие
  string object_id = 4;                  // объект действия (заявка, тур и т.п.)
  string old_value = 5;                  // старое значение
  string new_value = 6;                  // новое значение
  string ip = 7;                         // IP-адрес
  google.protobuf.Timestamp created = 8;
}

// Litwork - Литературное произведение
message LitWork {
  string id = 1;
  string title = 2;
  repeated string authorID = 3;
  repeated string audio = 4;
  repeated string clip = 5;
  repeated string video = 6;
  string release = 7;
  string lyrics = 8;
  bool active = 9;
  string owner_id = 10;
  google.protobuf.Timestamp created = 11;
  google.protobuf.Timestamp updated = 12;
  google.protobuf.Timestamp expires = 13;
}


// CONTEST

// CONTEST = ADD
message AddContestRequest {
    string id = 1;
    google.protobuf.Timestamp date = 2;
    string competition = 3;
    string author_id = 5;
    string artist_id = 6;
    string song_own_id = 7;
    string song_remake_id = 8;
    string lit_work_id = 9;
    int32 sort = 10;
    repeated string rate_book = 11;
    int32 status = 12;
    bool active = 13;
    string owner_id = 14;
    google.protobuf.Timestamp created = 15;
    google.protobuf.Timestamp updated = 16;
    google.protobuf.Timestamp expires = 17;
}

message AddContestResponse {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string competition = 3;
  string author_id = 5;
  string artist_id = 6;
  string song_own_id = 7;
  string song_remake_id = 8;
  string lit_work_id = 9;
  int32 sort = 10;
  repeated string rate_book = 11;
  int32 status = 12;
  bool active = 13;
  string owner_id = 14;
  google.protobuf.Timestamp created = 15;
  google.protobuf.Timestamp updated = 16;
  google.protobuf.Timestamp expires = 17;
}

// CONTEST = GET = ByID
message GetContestByIDRequest {
  string id = 1;
}

message GetContestByIDResponse {
  OneContest contest = 1;
  string message = 2;
}

// CONTEST = GET = ByPersonID
message GetContestByPersonIDRequest {
  string person_id = 1;
}
message GetContestsByPersonIDResponse {
  OneContest contest = 1;
  string message = 2;
}

// CONTEST = GET = With Empty Category
message GetContestWithEmptyCategoryRequest {
  string competition_id = 1;
}
message GetContestWithEmptyCategoryResponse {
  FullContent contest = 1;
}
// CONTESTS = LIST = By Category
message ListContestsByCategoryRequest {
  string category = 1;
  string filter = 2; // в фильтре указываются по каким флагам отфильтровываются заявки (top-100, top-10, top-3, winner)
  int32 limit = 3;   // сколько заявок за раз (например, 50)
  int32 offset = 4;  // с какой позиции (например, 0, 50, 100)
  string competition = 5; // идентификатор конкурса
  string sort_by = 6;  // ключ сортировки: artist, song, author, city, category, status, date (пусто = порядок по умолчанию)
  string sort_dir = 7; // направление: asc | desc (пусто = asc)
}
// CONTESTS = LIST = By Category = For site
message ListContestsByCategoryForSiteRequest {
  string category = 1;
  string filter = 2; // в фильтре указываются по каким флагам отфильтровываются заявки (top-100, top-10, top-3, winner)
  int32 limit = 3;   // сколько заявок за раз (например, 50)
  int32 offset = 4;  // с какой позиции (например, 0, 50, 100)
  string competition = 5; // идентификатор конкурса
}
message ListContestsByCategoryResponse {
  repeated FullContent contests = 1;
  int32 total = 2; // <-- всего заявок по этому competition
}

message ListContestsByCategoryForSiteResponse {
  repeated ContentForSite contests = 1;
  int32 total = 2; // <-- всего заявок по этому competition
}

message ListContestsByCategoryTop3Request {
  string category = 1;
  int32 limit = 2;   // сколько заявок за раз (например, 50)
  int32 offset = 3;  // с какой позиции (например, 0, 50, 100)
  string competition = 4;
}
message ListContestsByCategoryTop3Response {
  repeated FullContent contests = 1;
  int32 total = 2; // <-- всего заявок по этому competition
}
message ListWinnersRequest {
  string category = 1;
  int32 limit = 2;   // сколько заявок за раз (например, 50)
  int32 offset = 3;  // с какой позиции (например, 0, 50, 100)
  string competition = 4;
}
message ListWinnersResponse {
  repeated ContestShort contests = 1;
  int32 total = 2; // <-- всего заявок по этому competition
}

// CONTESTS = LIST
message ListContestsRequest {
  string competition = 1;
  int32 limit = 2;   // сколько заявок за раз (например, 50)
  int32 offset = 3;  // с какой позиции (например, 0, 50, 100)
}
message ListContestsResponse {
  repeated FullContent contests = 1;
  int32 total = 2; // <-- всего заявок по этому competition
}
// CONTESTS = LIST = Without Category || заявки без номинации (category пустая/отсутствует)
message ListContestsWithoutCategoryRequest {
  string competition = 1; // идентификатор конкурса
  int32 limit = 2;   // сколько заявок за раз (например, 50)
  int32 offset = 3;  // с какой позиции (например, 0, 50, 100)
  string sort_by = 4;  // ключ сортировки: artist, song, author, city, category, status, date (пусто = порядок по умолчанию)
  string sort_dir = 5; // направление: asc | desc (пусто = asc)
}
message ListContestsWithoutCategoryResponse {
  repeated FullContent contests = 1;
  int32 total = 2; // <-- всего заявок без номинации по этому competition
}
// CONTESTS = LIST = By Region
message ListContestsByRegionRequest {
  string region = 1;
  int32 limit = 2;   // сколько заявок за раз (например, 50)
  int32 offset = 3;  // с какой позиции (например, 0, 50, 100)
  string competition = 4;
}
message ListContestsByRegionResponse {
  repeated FullContent contests = 1;
  int32 total = 2; // <-- всего заявок по этому competition
}
// CONTESTS = UPDATE
message UpdateContestRequest {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string competition = 3;
  string author_id = 5;
  string artist_id = 6;
  string song_own_id = 7;
  string song_remake_id = 8;
  string lit_work_id = 9;
  google.protobuf.BoolValue top3   = 10;   // признак присутствия
  google.protobuf.BoolValue winner = 11;   // признак присутствия
  int32 sort = 12;
  repeated string rate_book = 13;
  int32 status = 14;
  string category = 15;
  bool active = 16;
  string owner_id = 17;
  google.protobuf.Timestamp created = 18;
  google.protobuf.Timestamp updated = 19;
  google.protobuf.Timestamp expires = 20;
  google.protobuf.FieldMask update_mask = 30; // какие поля менять
}
message UpdateContestResponse {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string competition = 3;
  string author_id = 5;
  string artist_id = 6;
  string song_own_id = 7;
  string song_remake_id = 8;
  string lit_work_id = 9;
  bool top3 = 10;
  bool winner = 11;
  int32 sort = 12;
  repeated string rate_book = 13;
  int32 status = 14;
  string category = 15;
  bool active = 16;
  string owner_id = 17;
  google.protobuf.Timestamp created = 18;
  google.protobuf.Timestamp updated = 19;
  google.protobuf.Timestamp expires = 20;
}
// CONTESTS = SET RATE
message UpdateContestAddRateRequest {
  string id = 1;
  Rate rate = 2;
  Rate rate_top3 = 3;
  ActionMeta meta = 4; // метаданные действия для журнала аудита
}
message UpdateContestAddRateResponse {
  string id = 1;
  FullContent full_contest = 2;
  string message = 18;
}


